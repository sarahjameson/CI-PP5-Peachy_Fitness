{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'profile/css/profile.css' %}">
{% endblock %}

{% block page_header %}
<div class="container header-container">
    <div class="row">
        <div class="col">

        </div>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="overlay"></div>

<div class="container mb-4">
    <div class="container mb-2">
        <div class="row">
            <div class="col text-center">
                <h2>Get in contact with us!</h2>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-12 col-md-6 offset-md-3">
            <form method="POST" action="{% url 'contact' %}" class="form mb-3" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form | crispy }}
                <div class="text-right mt-4">
                    <a href="{% url 'home' %}" class="btn btn-custom rounded-0 mb-5">
                        Cancel
                    </a>
                    <button class="btn btn-custom rounded-0 mb-5" type="submit">Submit</button>
                </div>
            </form>
        </div>

    </div>
</div>
{% endblock %}
